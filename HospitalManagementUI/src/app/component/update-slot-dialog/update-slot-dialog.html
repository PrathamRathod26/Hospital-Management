<h2 mat-dialog-title>Update Slot</h2>
<mat-dialog-content>
  <form [formGroup]="updateSlotForm">
    <mat-form-field appearance="fill">
      <mat-label>Start Time</mat-label>
      <input matInput type="time" formControlName="startTime">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>End Time</mat-label>
      <input matInput type="time" formControlName="endTime">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Slot Capacity</mat-label>
      <input matInput type="number" formControlName="slotCapacity">
      @if (updateSlotForm.get('slotCapacity')?.hasError('min')) {
        <mat-error>Capacity must be at least 1</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="AVAILABLE">Available</mat-option>
        <mat-option value="FULL">Full</mat-option>
        <mat-option value="DISABLED">Disabled</mat-option>
        <mat-option value="CANCELLED">Cancelled</mat-option>
      </mat-select>
    </mat-form-field>

    @if (updateSlotForm.hasError('timeRangeInvalid')) {
      <p style="color: red; font-size: 12px;">End time must be after Start time.</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="updateSlotForm.invalid" (click)="onSubmit()">OK</button>
</mat-dialog-actions>
