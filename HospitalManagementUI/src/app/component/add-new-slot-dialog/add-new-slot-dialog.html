<h2 mat-dialog-title>Add New Appointment Slot</h2>

<form [formGroup]="addSlotForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="slot-form-container">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="addSlotForm.get('date')?.hasError('required')">Date is required</mat-error>
    </mat-form-field>

    <div class="time-row">
      <mat-form-field appearance="outline">
        <mat-label>Start Time</mat-label>
        <input matInput type="time" formControlName="startTime">
        <mat-error *ngIf="addSlotForm.get('startTime')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Time</mat-label>
        <input matInput type="time" formControlName="endTime">
        <mat-error *ngIf="addSlotForm.get('endTime')?.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>

    <div class="custom-error" *ngIf="addSlotForm.hasError('timeRangeInvalid') && addSlotForm.get('endTime')?.touched">
      <small>End time must be after the start time.</small>
    </div>

    <div class="capacity-row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Slot Capacity</mat-label>
        <input matInput type="number" formControlName="slotCapacity">
        <mat-error *ngIf="addSlotForm.get('slotCapacity')?.hasError('min')">Capacity must be at least 1</mat-error>
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="addSlotForm.invalid">
      Create Slot
    </button>
  </mat-dialog-actions>
</form>
