<div class="doc-viewer-wrapper">
  <header class="viewer-header">
    <div class="header-content">
      <mat-icon class="title-icon">description</mat-icon>
      <h2 class="mat-h2">Document Preview</h2>
    </div>
    <button mat-icon-button (click)="close()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <mat-dialog-content class="viewer-content">
    <div class="iframe-container">
      <iframe 
        [src]="document()" 
        width="100%" 
        height="100%" 
        frameborder="0"
        title="Medical Document Viewer">
      </iframe>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="viewer-actions">
    <button mat-button (click)="close()">Dismiss</button>
    <a mat-flat-button color="primary" [href]="document()" target="_blank">
      <mat-icon>open_in_new</mat-icon>
      Open Fullscreen
    </a>
  </mat-dialog-actions>
</div>
